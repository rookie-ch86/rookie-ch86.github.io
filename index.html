from zipfile import ZipFile
from pathlib import Path

html = r'''<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>专业版幸运转盘</title>
<style>
*{box-sizing:border-box}body{margin:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#6dd5fa,#fefcea,#fcb69f);font-family:-apple-system,"Microsoft YaHei",sans-serif}
h2{margin:10px}
.wrap{position:relative}
#pointer{position:absolute;left:50%;top:-8px;transform:translateX(-50%);width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:40px solid #e53935;z-index:5;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
canvas{width:min(90vw,430px);height:min(90vw,430px);border-radius:50%;border:8px solid #333;background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.25)}
#center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:90px;height:90px;border-radius:50%;border:none;background:#ff5722;color:#fff;font-size:22px;font-weight:bold;cursor:pointer;z-index:4}
#center:disabled{opacity:.7}
#result{margin-top:20px;font-size:1.5rem;font-weight:bold;text-align:center;min-height:60px}
</style>
</head>
<body>
<h2>🎯 明天去哪里学习</h2>
<div class="wrap">
<div id="pointer"></div>
<canvas id="wheel" width="500" height="500"></canvas>
<button id="center">开始</button>
</div>
<div id="result"></div>
<script>
const opts=["🏠 在家学","📚 图书馆学","🎉 放假","📖 复习"];
const colors=["#FFD54F","#81C784","#64B5F6","#E57373"];
const cvs=document.getElementById("wheel"),ctx=cvs.getContext("2d");
const btn=document.getElementById("center"),res=document.getElementById("result");
const R=250,step=360/opts.length;
let angle=0,spinning=false;
function draw(){
 const rad=2*Math.PI/opts.length;
 for(let i=0;i<opts.length;i++){
   ctx.beginPath();ctx.moveTo(R,R);ctx.arc(R,R,R,i*rad,(i+1)*rad);ctx.fillStyle=colors[i];ctx.fill();
   ctx.save();ctx.translate(R,R);ctx.rotate(i*rad+rad/2);
   ctx.font="bold 24px sans-serif";ctx.textAlign="right";ctx.fillStyle="#222";
   ctx.fillText(opts[i],200,8);ctx.restore();
 }
}
draw();
btn.onclick=()=>{
 if(spinning)return;
 spinning=true;btn.disabled=true;res.textContent="";
 const idx=Math.floor(Math.random()*opts.length);
 const target=270-(idx*step+step/2);
 angle+=2160+((target-angle)%360+360)%360;
 cvs.style.transition="transform 5.5s cubic-bezier(.12,.9,.18,1)";
 cvs.style.transform=`rotate(${angle}deg)`;
 if(navigator.vibrate) navigator.vibrate([80,50,80]);
 setTimeout(()=>{
   res.innerHTML="🎉 明天安排：<br><span style='font-size:2rem'>"+opts[idx]+"</span>";
   spinning=false;btn.disabled=false;
 },5600);
};
</script>
</body>
</html>'''
