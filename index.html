<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>明天去哪里学习</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #6dd5fa 0%,
        #ffffff 50%,
        #fcb69f 100%
    );

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Microsoft YaHei",
    sans-serif;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
}

.wrapper{
    position:relative;
}

.pointer{
    position:absolute;
    left:50%;
    top:-15px;

    transform:translateX(-50%);

    width:0;
    height:0;

    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:45px solid #ff3b30;

    z-index:100;

    filter:
    drop-shadow(0 3px 5px rgba(0,0,0,.3));
}

#wheel{

    width:min(90vw,450px);
    height:min(90vw,450px);

    border-radius:50%;

    border:8px solid #333;

    background:white;

    box-shadow:
    0 10px 30px rgba(0,0,0,.25);

    transform-origin: center;
}

#spinBtn{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:100px;
    height:100px;

    border:none;

    border-radius:50%;

    background:#ff5722;

    color:white;

    font-size:24px;
    font-weight:bold;

    cursor:pointer;

    z-index:99;

    box-shadow:
    0 5px 15px rgba(0,0,0,.3);

}

#spinBtn:active{
    transform:
    translate(-50%,-50%)
    scale(.95);
}

.result{

    margin-top:30px;

    font-size:32px;

    font-weight:bold;

    text-align:center;

    min-height:80px;
}

.result span{
    color:#ff5722;
}

</style>
</head>

<body>

<div class="title">
🎯 明天去哪里学习
</div>

<div class="wrapper">

    <div class="pointer"></div>

    <canvas
        id="wheel"
        width="500"
        height="500">
    </canvas>

    <button id="spinBtn">
        开始
    </button>

</div>

<div class="result" id="result"></div>

<script>

const options = [
    "🏠 在家学",
    "📚 图书馆学",
    "🎉 放假",
    "📖 复习"
];

const colors = [
    "#FFD54F",
    "#81C784",
    "#64B5F6",
    "#E57373"
];

const canvas =
document.getElementById("wheel");

const ctx =
canvas.getContext("2d");

const radius = 250;

const sectorAngle =
360 / options.length;

let currentRotation = 0;

let spinning = false;

/* 绘制转盘 */

function drawWheel(){

    const arc =
    2 * Math.PI /
    options.length;

    for(let i=0;i<options.length;i++){

        ctx.beginPath();

        ctx.moveTo(
            radius,
            radius
        );

        ctx.arc(
            radius,
            radius,
            radius,
            i*arc,
            (i+1)*arc
        );

        ctx.fillStyle =
        colors[i];

        ctx.fill();

        ctx.save();

        ctx.translate(
            radius,
            radius
        );

        ctx.rotate(
            i*arc +
            arc/2
        );

        ctx.textAlign =
        "right";

        ctx.font =
        "bold 24px Microsoft YaHei";

        ctx.fillStyle =
        "#222";

        ctx.fillText(
            options[i],
            200,
            10
        );

        ctx.restore();
    }
}

drawWheel();

const wheel =
document.getElementById("wheel");

const result =
document.getElementById("result");

const btn =
document.getElementById("spinBtn");

/* 计算指针指向的选项索引 */

function getPointerIndex(rotation) {
    // 标准化旋转角度到 0-360
    const normalizedRotation = 
        ((rotation % 360) + 360) % 360;
    
    // 指针在顶部（-90° 或 270°）
    // 计算指针指向的角度
    const pointerAngle = (270 - normalizedRotation + 360) % 360;
    
    // 计算对应的选项索引
    const index = 
        Math.floor(pointerAngle / sectorAngle) % 
        options.length;
    
    return index;
}

/* 抽奖 */

btn.onclick = () => {

    if(spinning) return;

    spinning = true;

    btn.disabled = true;

    result.innerHTML = "";

    const index =
    Math.floor(
        Math.random() *
        options.length
    );

    // 计算转盘需要转到的角度
    // 让第 index 项的中心指向指针(270°)
    const targetAngle = 
        270 - 
        (
            index * sectorAngle + 
            sectorAngle / 2
        );

    // 累计旋转角度：转过多圈后停在目标位置
    currentRotation +=
        360 * 6 +
        (
            (
                targetAngle -
                (currentRotation % 360)
            ) + 360
        ) % 360;

    wheel.style.transition =
    "transform 5.5s cubic-bezier(.12,.9,.18,1)";

    wheel.style.transform =
    `rotate(${currentRotation}deg)`;

    if(navigator.vibrate){
        navigator.vibrate(
            [80,50,80]
        );
    }

    setTimeout(()=>{

        // 验证最终指向的选项
        const finalIndex = 
            getPointerIndex(currentRotation);

        result.innerHTML =
        `
        🎉 明天安排<br>
        <span>${options[finalIndex]}</span>
        `;

        spinning = false;

        btn.disabled = false;

    },5600);
};

</script>

</body>
</html>
